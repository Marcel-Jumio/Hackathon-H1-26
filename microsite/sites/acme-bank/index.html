  <style>
    :root { --radius: 12px; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--jumio-sdk-font-family, system-ui, sans-serif);
      color: var(--jumio-sdk-theme-light-text-color, #111418);
      background: var(--jumio-sdk-theme-light-page-bg-color, #fff);

    header { padding: 1.5em 1em; display: flex; align-items: center; gap: 0.75em; }
    header img { height: 32px; }
    .stepper { list-style: none; display: flex; gap: 0.5em; padding: 0 1em; margin: 0 0 1.5em; }
    .step {
      flex: 1; text-align: center; padding: 0.75em 0.5em; border-radius: var(--radius);
      background: var(--jumio-sdk-theme-light-app-container-bg-color, #f5f7fa);
      font-size: 0.85em; opacity: 0.6;
    }
    .step.is-active { opacity: 1; outline: 2px solid var(--jumio-sdk-color-primary4, #0a7d33); }
    .step.is-done { opacity: 0.85; }
    .step__index {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.5em; height: 1.5em; border-radius: 50%; margin-right: 0.4em;
      background: var(--jumio-sdk-color-primary4, #0a7d33);
      color: var(--jumio-sdk-theme-light-clickable-primary-default-color, #fff);
      font-weight: 600;
    }
    main {
      max-width: 480px; margin: 0 auto;
      padding: 2em 1em 2em 1em;

    .cta { color: var(--jumio-sdk-color-primary6, #075423); font-weight: 600; }
    .start-verification {
      font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: var(--radius);
      padding: 0.7em 1.2em; margin-top: 1em;
      background: var(--jumio-sdk-color-primary4, #0a7d33);
      color: var(--jumio-sdk-theme-light-clickable-primary-default-color, #fff);
    }

    .jumio-sdk-skeleton { display: flex; flex-direction: column; gap: 0.6em; padding: 1em 0; }
    .skeleton-line, .skeleton-block {
      border-radius: 6px;
      background: linear-gradient(90deg,
        var(--jumio-sdk-color-primary1, #e5e7eb) 25%,
        var(--jumio-sdk-color-primary2, #f3f4f6) 50%,
        var(--jumio-sdk-color-primary1, #e5e7eb) 75%);

<body>
  <header>
    <img src="https://acme.example.com/assets/logo.svg" alt="Acme Bank" />
    <strong>Acme Bank</strong>
  </header>

  <ol class="stepper">
      <li class="step is-done"><span class="step__index">1</span><span class="step__label">Create account</span></li>
      <li class="step is-active"><span class="step__index">2</span><span class="step__label">Verify identity</span></li>
      <li class="step "><span class="step__index">3</span><span class="step__label">Done</span></li>
  </ol>

  <main>
    <section data-step="0" hidden><h1>Create account</h1></section>
    <section data-step="1">
      <h1>Verify identity</h1>
      <p class="cta">Verify your identity</p>

      <div id="jumio-sdk-mount"><div class="jumio-sdk-skeleton" aria-hidden="true">
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line--short"></div>
        <div class="skeleton-block"></div>
      </div></div>
      <button type="button" class="start-verification" id="start-verification">Start verification</button>
      <script>
        document.getElementById('start-verification').addEventListener('click', () => {
          document.getElementById('jumio-sdk-mount').outerHTML = `<!-- TODO: replace with a real pre-created session token (see ARCHITECTURE.md). -->
      <jumio-sdk dc="us" token="REPLACE_WITH_SESSION_TOKEN"></jumio-sdk>`;
          document.getElementById('start-verification').remove();
        });
      </script>
    </section>
    <section data-step="2" hidden><h1>Done</h1></section>
  </main>
</body>
